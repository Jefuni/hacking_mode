<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hackers Mode</title>
    <link rel="shortcut icon" href="images/hackers_mode.jpg" type="image/x-icon">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: monospace;

        }

        body {
            height: 100vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #00ff00;
            overflow: hidden;


        }

        h1 {
            font-size: 40px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #00ff00;
            position: relative;
            z-index: 1;
        }
        canvas{
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
        }
    </style>
</head>

<body>
    <canvas id="matrix"></canvas>
    <h1 id="scramble">HAPPY HACKING!</h1>
    
    <script>
        const el = document.getElementById("scramble")
        const originalText = el.textContent;
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ123456789@#$%^&*()_+-=[]{}<>?/\|"

        let iteration = 0;
        function scrambleEffect() {
            iteration = 0;
            const interval = setInterval(() => {
                el.textContent = originalText
            
                    .split("")
                    .map((char, index) => {
                        if (index < iteration) {
                            return originalText[index];

                        }
                        return letters[Math.floor(Math.random() * letters.length)]
                    })
                    .join("");
                if (iteration >= originalText.length) {
                    clearInterval(interval);
                    

                }
                iteration += 0.3; 


            }, 50)
        }
        scrambleEffect();



         const canvas = document.getElementById("matrix");
        const ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const matrixChars = "アカサタナハマヤラワ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const fontSize = 16;
        const columns = Math.floor(canvas.width / fontSize);

        const drops = Array(columns).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#00ff00";
            ctx.font = fontSize + "px monospace";

            drops.forEach((y, i) => {
                const text = matrixChars[Math.floor(Math.random() * matrixChars.length)];
                ctx.fillText(text, i * fontSize, y * fontSize);

                if (y * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }

                drops[i]++;
            });
        }

        setInterval(drawMatrix, 35);

        

    </script>
</body>

</html>
